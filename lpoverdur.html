<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LP Performance Dashboard</title>

<style>

body{
font-family:Segoe UI;
margin:20px;
background:#f4f6f9;
}

h1{
text-align:center;
color:#2c3e50;
}

.tabs{
text-align:center;
margin-bottom:20px;
}

.tabs button{
padding:10px 20px;
margin:5px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:4px;
font-weight:bold;
}

.tabs button:hover{
background:#2c3e50;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#3498db;
color:white;
cursor:pointer;
}

tr:nth-child(even){
background:#f2f2f2;
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:4px;
cursor:pointer;
}

.controls{
text-align:center;
margin:15px;
}

</style>

</head>

<body>

<h1>LP PERFORMANCE DASHBOARD</h1>

<div class="tabs">

<button onclick="showTab('reportTab')">LP Overdue Report</button>
<button onclick="showTab('summaryTab')">LP Cat Wise Summary</button>

</div>

<!-- REPORT TAB -->

<div id="reportTab">

<div class="controls">

<button onclick="clearFilters()">Clear Filters</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadCSV()">Download CSV</button>

</div>

<div id="inspectionCount"></div>

<table>

<thead>
<tr id="headerRow"></tr>
<tr id="filterRow"></tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- SUMMARY TAB -->

<div id="summaryTab" style="display:none">

<h2>LP Category Wise Summary</h2>

<div class="controls">
<button onclick="downloadSummary()">Download Summary CSV</button>
</div>

<table>

<thead>

<tr>
<th>Cli Name</th>
<th>A Category LP</th>
<th>B Category LP</th>
<th>C Category LP</th>
<th>Total</th>
</tr>

</thead>

<tbody id="summaryBody"></tbody>

</table>

</div>

<script>

const sheetId='1MFtqC6Gq17KN6-afXXH1I8oIT3JfJ1qRiOh0dOj-S58'
const apiKey='AIzaSyBG5Y_6PX9WT-0Mu5-Wv8Z9hA6ATF3TqR0'

let allData=[]
let filteredData=[]
let columnNames=[]
let filters={}
let sortOrder={}

function fetchData(){

const url=`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/overdue?key=${apiKey}`

fetch(url)

.then(res=>res.json())

.then(data=>{

columnNames=data.values[0]
allData=data.values.slice(1)
filteredData=[...allData]

createFilters()
renderTable()
renderSummary()

})

}

function showTab(tab){

document.getElementById('reportTab').style.display='none'
document.getElementById('summaryTab').style.display='none'

document.getElementById(tab).style.display='block'

}

function createFilters(){

const filterRow=document.getElementById('filterRow')
filterRow.innerHTML=''

columnNames.slice(0,8).forEach((col,index)=>{

const th=document.createElement('th')
const select=document.createElement('select')

select.innerHTML='<option value="">All</option>'

const unique=[...new Set(allData.map(r=>r[index]))]

unique.sort().forEach(val=>{

if(val){

const option=document.createElement('option')
option.value=val
option.textContent=val
select.appendChild(option)

}

})

select.onchange=()=>{

filters[index]=select.value
applyFilters()

}

th.appendChild(select)
filterRow.appendChild(th)

})

}

function applyFilters(){

filteredData=[...allData]

Object.keys(filters).forEach(i=>{

if(filters[i]){
filteredData=filteredData.filter(r=>r[i]==filters[i])
}

})

renderTable()

}

function renderTable(){

const body=document.getElementById('tableBody')
const header=document.getElementById('headerRow')

body.innerHTML=''
header.innerHTML=''

columnNames.slice(0,8).forEach((col,i)=>{

const th=document.createElement('th')
th.textContent=col
th.onclick=()=>sortTable(i)

header.appendChild(th)

})

filteredData.forEach(row=>{

const tr=document.createElement('tr')

row.slice(0,8).forEach(cell=>{

const td=document.createElement('td')
td.textContent=cell
tr.appendChild(td)

})

body.appendChild(tr)

})

document.getElementById('inspectionCount').innerText="Total Records : "+filteredData.length

}

function sortTable(index){

if(sortOrder[index]=='asc') sortOrder[index]='desc'
else sortOrder[index]='asc'

filteredData.sort((a,b)=>{

let A=a[index]||''
let B=b[index]||''

return sortOrder[index]=='asc'
?A.localeCompare(B)
:B.localeCompare(A)

})

renderTable()

}

function renderSummary(){

const body=document.getElementById('summaryBody')
body.innerHTML=''

allData.forEach(row=>{

const name=row[9]
const A=parseInt(row[10])||0
const B=parseInt(row[11])||0
const C=parseInt(row[12])||0

if(name && name.trim()!=''){

const total=A+B+C

const tr=document.createElement('tr')

tr.innerHTML=`
<td>${name}</td>
<td>${A}</td>
<td>${B}</td>
<td>${C}</td>
<td>${total}</td>
`

body.appendChild(tr)

}

})

}

function downloadCSV(){

let csv=columnNames.slice(0,8).join(',')+"\n"

filteredData.forEach(r=>{
csv+=r.slice(0,8).join(',')+"\n"
})

const blob=new Blob([csv],{type:'text/csv'})
const url=URL.createObjectURL(blob)

const a=document.createElement('a')
a.href=url
a.download='LP_OVERDUE_REPORT.csv'
a.click()

}

function downloadSummary(){

let csv="Name,A Category,B Category,C Category,Total\n"

allData.forEach(row=>{

const name=row[9]
const A=parseInt(row[10])||0
const B=parseInt(row[11])||0
const C=parseInt(row[12])||0

if(name && name.trim()!=''){

const total=A+B+C

csv+=`${name},${A},${B},${C},${total}\n`

}

})

const blob=new Blob([csv],{type:'text/csv'})
const url=URL.createObjectURL(blob)

const a=document.createElement('a')
a.href=url
a.download='LP_CATEGORY_SUMMARY.csv'
a.click()

}

function clearFilters(){

filters={}
filteredData=[...allData]
renderTable()

}

window.onload=fetchData

</script>

</body>
</html>
